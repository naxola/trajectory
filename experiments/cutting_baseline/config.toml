name = "cutting_baseline"
skill = "cutting"
profiles = ["hospital_a", "hospital_b"]

[model]
name = "mlp"
hidden_dim = 64 #Es el numero de neuronas en la capa oculta
dropout = 0.1 #Es la probabilidad de dropout (numero de neuronas que se apagan aleatoriamente durante el entrenamiento)

[data]
num_samples = 1500 #Numero total de muestras
trajectory_length = 50 #Longitud de la trayectoria
val_split = 0.2 #Porcentaje de datos que se usan para validacion

[training]
epochs = 20 #Numero de epocas
batch_size = 32 #Numero de muestras por batch
learning_rate = 0.001 #Tasa de aprendizaje
seed = 42 #Semilla para la generacion de datos paeudoaleatorios