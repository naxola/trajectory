name = "cutting_spline"
skill = "cutting"
# Dos hospitales con la MISMA incisión de referencia (spline), distinta pericia:
#   hospital_c = experto (radio pequeño)   hospital_d = intermedio (radio mayor).
# Comparten la curva objetivo → comparables por desviación contra la referencia.
profiles = ["hospital_c", "hospital_d"]

[model]
name = "mlp"
hidden_dim = 80 #Es el numero de neuronas en la capa oculta
dropout = 0.2 #Es la probabilidad de dropout (numero de neuronas que se apagan aleatoriamente durante el entrenamiento)

[data]
num_samples = 4000 #Numero total de muestras
trajectory_length = 100 #Longitud de la trayectoria
val_split = 0.2 #Porcentaje de datos que se usan para validacion

[training]
epochs = 30 #Numero de epocas
batch_size = 64 #Numero de muestras por batch
learning_rate = 0.0005 #Tasa de aprendizaje
seed = 10 #Semilla para la generacion de datos paeudoaleatorios